apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow-users-api
  namespace: flow
  labels:
    app: flow-users-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flow-users-api
  template:
    metadata:
      labels:
        app: flow-users-api
    spec:
      containers:
        - name: flow-users-api
          image: christiangns/flow-users-api:latest
          ports:
            - containerPort: 4545
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      imagePullSecrets:
        - name: regcred  
