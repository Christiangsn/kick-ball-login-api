<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: transparent; /* Importante para iframe */
      min-height: 100vh;
    }
    
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    
    /* Seus estilos aqui */
  </style>
</head>
<body>
  <div class="container">
    <h2>Redefinir Senha</h2>
    <form id="resetForm">
      <!-- Seu formulário -->
    </form>
  </div>

  <script>
    // Verificar se está dentro de um iframe do seu domínio
    if (window.self === window.top) {
      // Está sendo acessado diretamente (não em iframe)
      document.body.innerHTML = '<p>Acesso não autorizado</p>';
    } else {
      // Verificar se o parent é do mesmo domínio
      try {
        const parentOrigin = window.parent.location.origin;
        const allowedOrigins = ['https://seudominio.com', 'http://localhost:4545'];
        
        if (!allowedOrigins.includes(parentOrigin)) {
          document.body.innerHTML = '<p>Acesso não autorizado</p>';
        }
      } catch (e) {
        // Se der erro de CORS, significa que é de outro domínio
        document.body.innerHTML = '<p>Acesso não autorizado</p>';
      }
    }

    // Comunicação com a página pai (se necessário)
    window.addEventListener('message', (event) => {
      // Validar origem
      if (event.origin !== 'https://seudominio.com') return;
      
      // Processar mensagem
      console.log('Mensagem recebida:', event.data);
    });

    // Enviar mensagem para a página pai
    function sendToParent(data) {
      window.parent.postMessage(data, 'https://seudominio.com');
    }
  </script>
</body>
</html>
